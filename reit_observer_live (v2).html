function isTrusted(name){
  if(!name)return false;
  if(TRUSTED.has(name))return true;
  const lo=name.toLowerCase();
  for(const t of TRUSTED){if(lo.includes(t.toLowerCase()))return true;}
  return false;
}

async function getGSToken(){
  const now=Date.now();
  if(_gsToken&&now<_gsTokenExpiry-60000)return _gsToken;
  try{
    const res=await fetch(GS_TOKEN_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","User-Agent":"REIT-Observer/1.0"},
      body:JSON.stringify({client_id:GS_CLIENT_ID,client_secret:GS_CLIENT_SECRET,grant_type:"client_credentials",audience:GS_AUDIENCE})
    });
    if(!res.ok)throw new Error(`Token ${res.status}`);
    const data=await res.json();
    _gsToken=data.access_token;
    _gsTokenExpiry=now+(data.expires_in||3600)*1000;
    console.log("GS token acquired, expires in",data.expires_in+"s");
    return _gsToken;
  }catch(e){console.warn("GS token error:",e.message);return null;}
}

async function gsApiFetch(baseUrl,path){
  if(_gsMode==="direct"){
    const token=await getGSToken();
    if(!token)return null;
    const res=await fetch(`${baseUrl}${path}`,{headers:{"Authorization":`Bearer ${token}`,"User-Agent":"REIT-Observer/1.0","Accept":"application/json"}});
    if(!res.ok)return null;
    return res.json();
  }else if(_gsMode==="proxy"){
    const prefix=baseUrl.includes("news-service")?"/gs-news":"/gs-data";
    const res=await fetch(`${GS_PROXY}${prefix}${path}`);
    if(!res.ok)return null;
    return res.json();
  }
  return null;
}

// Fetch GS News articles by sector keyword
async function fetchGSNews(keywords){
  if(!_gsAvailable)return[];
  const articles=[];
  try{
    for(const kw of keywords){
      const data=await gsApiFetch("https://web-news-service.greenstreet.com",`/api/articles?region=USA&keyword=${encodeURIComponent(kw)}`);
      if(data?.data)data.data.forEach(a=>articles.push({
        title:a.title||"",
        source:"Green Street",
        date:a.createdAt?a.createdAt.slice(0,10):"",
        url:a.gsNewsUrl||"",
        desc:(a.excerpt||"").slice(0,400),
        from:"greenstreet",
        trusted:true,
        gsId:a.id
      }));
      await new Promise(r=>setTimeout(r,200));
    }
  }catch(e){console.warn("GS News error:",e);}
  const seen=new Set();
  return articles.filter(a=>{if(a.gsId&&seen.has(a.gsId))return false;if(a.gsId)seen.add(a.gsId);return true;});
}

async function fetchTickerNews(tickers){
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  const today=new Date().toISOString().slice(0,10);
  const weekAgo=new Date(Date.now()-14*86400000).toISOString().slice(0,10);

  for(const tk of tickers){
    if(_newsCache[tk])continue;
    const articles=[];

    // 1. Polygon news
    try{
      const url=`https://api.polygon.io/v2/reference/news?ticker=${tk}&limit=10&order=desc&sort=published_utc&apiKey=${POLYGON_KEY}`;
      const res=await fetch(url);
      if(res.ok){
        const data=await res.json();
        (data.results||[]).forEach(a=>articles.push({
          title:a.title||"",
          source:a.publisher?.name||"",
          date:a.published_utc?.slice(0,10)||"",
          url:a.article_url||"",
          desc:(a.description||"").slice(0,400),
          from:"polygon"
        }));
      }
    }catch(e){}

    await delay(100);

    // 2. Finnhub company news
    try{
      const url=`https://finnhub.io/api/v1/company-news?symbol=${tk}&from=${weekAgo}&to=${today}&token=${FINNHUB_KEY}`;
      const res=await fetch(url);
      if(res.ok){
        const data=await res.json();
        (data||[]).slice(0,10).forEach(a=>articles.push({
          title:a.headline||"",
          source:a.source||"",
          date:a.datetime?new Date(a.datetime*1000).toISOString().slice(0,10):"",
          url:a.url||"",
          desc:(a.summary||"").slice(0,400),
          from:"finnhub"
        }));
      }
    }catch(e){}

    // 3. Green Street news (direct or via proxy)
    if(_gsAvailable){
      try{
        const data=await gsApiFetch("https://web-news-service.greenstreet.com",`/api/articles?region=USA&keyword=${tk}`);
        if(data?.data)(data.data).slice(0,5).forEach(a=>articles.push({
          title:a.title||"",
          source:"Green Street",
          date:a.createdAt?a.createdAt.slice(0,10):"",
          url:a.gsNewsUrl||"",
          desc:(a.excerpt||"").slice(0,400),
          from:"greenstreet",
          trusted:true
        }));
      }catch(e){}
      await delay(100);
    }

    // Dedupe by headline similarity (first 60 chars lowercase)
    const seen=new Set();
    const deduped=[];
    articles.forEach(a=>{
      const key=(a.title||"").toLowerCase().slice(0,60).replace(/[^a-z0-9]/g,"");
      if(key.length>10&&seen.has(key))return;
      if(key.length>10)seen.add(key);
      a.trusted=isTrusted(a.source);
      deduped.push(a);
    });

    // Sort: trusted first, then by date descending
    deduped.sort((a,b)=>{
      if(a.trusted&&!b.trusted)return -1;
      if(!a.trusted&&b.trusted)return 1;
      return(b.date||"").localeCompare(a.date||"");
    });

    _newsCache[tk]=deduped;
    await delay(100);
  }
}

function generateBriefs(){
  const briefs=[];
  const today=new Date().toISOString().slice(0,10);

  // Sort all tickers by absolute day move — biggest moves first
  const movers=R.filter(r=>r[14]!=null&&Math.abs(r[14])>=0.5).sort((a,b)=>Math.abs(b[14])-Math.abs(a[14]));
  const covered=new Set();

  movers.forEach(r=>{
    const news=(_newsCache[r[1]]||[]).filter(a=>a.trusted);
    if(news.length===0)return;
    if(covered.size>=12)return;

    const art=news.find(a=>a.desc&&a.desc.length>50)||news[0];
    if(!art)return;

    const dir=r[14]>=0;
    const absMove=Math.abs(r[14]);
    // Classification: big movers are alerts/opportunities, moderate are watch/info
    const type=absMove>=3?(dir?"opportunity":"alert"):absMove>=1.5?(dir?"opportunity":"watch"):(dir?"info":"watch");

    const chg=`${dir?"+":""}${r[14].toFixed(2)}%`;
    const sector=r[13];

    // Lead with the WHY (description), not the price move
    // Description gives the institutional context — catalyst, earnings detail, analyst action
    const body=art.desc&&art.desc.length>50
      ?art.desc+(art.desc.endsWith(".")?"":"…")
      :art.title;

    briefs.push({
      type,
      tag:`${r[1]} ${chg} · ${sector}`,
      text:body,
      source:art.source,
      date:art.date||today,
      url:art.url,
      price:`$${r[2].toFixed(2)}`,
      ticker:r[1]
    });
    covered.add(r[1]);
  });

  // Add movers with NO trusted news — flag them so the desk knows to dig
  const noNews=movers.filter(r=>Math.abs(r[14])>=2&&!covered.has(r[1])).slice(0,3);
  noNews.forEach(r=>{
    const chg=`${r[14]>=0?"+":""}${r[14].toFixed(2)}%`;
    briefs.push({
      type:r[14]>=0?"info":"watch",
      tag:`${r[1]} ${chg} · ${r[13]} · NO CATALYST IDENTIFIED`,
      text:`${r[0]} moved ${chg} to $${r[2].toFixed(2)} with no institutional coverage found. May warrant a check with sell-side or sector desk.`,
      source:"Polygon.io",
      date:today,
      ticker:r[1]
    });
  });

  // Green Street sector research (highest quality — always show if available)
  const gsArticles=_newsCache["__GS_SECTOR__"]||[];
  gsArticles.slice(0,4).forEach(a=>{
    // Avoid duplicate headlines
    const key=(a.title||"").toLowerCase().slice(0,60).replace(/[^a-z0-9]/g,"");

// ── Helper: date N months back, skip weekends ──
function dateBack(months){
  const d=new Date();d.setMonth(d.getMonth()-months);
  while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
function lastTradingDay(){
  const d=new Date();
  const et=new Date(d.toLocaleString("en-US",{timeZone:"America/New_York"}));
  if(et.getHours()<9||(et.getHours()===9&&et.getMinutes()<30))d.setDate(d.getDate()-1);
  while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}

// ── 1. Snapshot: real-time price + todaysChangePerc ──
async function fetchSnapshot(){
  const results=[];
  for(let i=0;i<TICKERS.length;i+=50){
    const batch=TICKERS.slice(i,i+50).join(",");
    const url=`https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers?tickers=${batch}&apiKey=${POLYGON_KEY}`;
    const res=await fetch(url);
    if(!res.ok){
      const body=await res.text().catch(()=>"no body");
      const msg=`Snapshot HTTP ${res.status} — ${body.slice(0,200)}`;
      console.error(msg);
      throw new Error(msg);
    }
    const data=await res.json();
    if(data.tickers)results.push(...data.tickers);
    else console.warn("Snapshot response missing tickers array:",JSON.stringify(data).slice(0,200));
  }
  const map={};
  results.forEach(t=>{
    const price=t.lastTrade?.p||t.day?.c||t.prevDay?.c;
    const pct=t.todaysChangePerc;
    if(price!=null&&!isNaN(price)){
      map[t.ticker]={price:parseFloat(price),pct:(pct!=null&&isFinite(pct))?parseFloat(pct.toFixed(2)):null};
    }
  });
  console.log(`Snapshot: ${Object.keys(map).length}/${TICKERS.length} tickers, sample:`,Object.entries(map).slice(0,3));
  return map;
}

// ── 2. Grouped daily fallback ──
async function fetchGrouped(){
  const ds=lastTradingDay();
  const url=`https://api.polygon.io/v2/aggs/grouped/locale/us/market/stocks/${ds}?adjusted=true&apiKey=${POLYGON_KEY}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error(`Grouped ${res.status}`);
  const data=await res.json();
  const map={};
  if(data.results)data.results.forEach(t=>{
    if(TICKER_SET.has(t.T)&&t.c!=null){
      map[t.T]={price:t.c,pct:t.o>0?parseFloat(((t.c-t.o)/t.o*100).toFixed(2)):null};
    }
  });
  return map;
}

// ── 3. Historical prices for 1M/3M/1Y returns ──
async function fetchHistorical(){
  const periods=[{key:"m1",months:1},{key:"m3",months:3},{key:"y1",months:12}];
  for(const{key,months}of periods){
    const ds=dateBack(months);
    try{
      const url=`https://api.polygon.io/v2/aggs/grouped/locale/us/market/stocks/${ds}?adjusted=true&apiKey=${POLYGON_KEY}`;
      const res=await fetch(url);
      if(res.ok){
        const data=await res.json();
        if(data.results)data.results.forEach(t=>{
          if(TICKER_SET.has(t.T)&&t.c!=null)_histPrices[key][t.T]=t.c;
        });
      }
    }catch(e){console.warn(`Hist ${months}M failed:`,e);}
  }
}

// ── 4. Dividends → forward yield (matches Google/Yahoo/Bloomberg) ──
// Uses most recent declared dividend × annualised frequency
// Monthly payers (O, STAG, etc.) detected automatically
async function fetchDividends(){
  const from=dateBack(14);
  const oneYrAgo=new Date();oneYrAgo.setFullYear(oneYrAgo.getFullYear()-1);
  const BATCH=10;
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  for(let i=0;i<TICKERS.length;i+=BATCH){
    const batch=TICKERS.slice(i,i+BATCH);
    await Promise.all(batch.map(tk=>
      fetch(`https://api.polygon.io/v3/reference/dividends?ticker=${tk}&ex_dividend_date.gte=${from}&limit=20&apiKey=${POLYGON_KEY}`)
        .then(r=>r.ok?r.json():null)
        .then(data=>{
          if(data?.results&&data.results.length>0){
            // Sort newest first, filter to regular cash dividends only
            const divs=data.results
              .filter(d=>d.cash_amount&&d.cash_amount>0&&(d.dividend_type==="CD"||!d.dividend_type))
              .sort((a,b)=>new Date(b.ex_dividend_date)-new Date(a.ex_dividend_date));
            if(!divs.length)return;
            const recent=divs[0].cash_amount;
            // Count TTM payments to detect frequency (monthly=12, quarterly=4, semi=2, annual=1)
            const ttm=divs.filter(d=>new Date(d.ex_dividend_date)>=oneYrAgo).length;
            const freq=ttm>=10?12:ttm>=3?4:ttm>=2?2:4; // default quarterly if ambiguous
            _annualDiv[tk]=recent*freq;
          }
        }).catch(()=>{})
    ));
    if(i+BATCH<TICKERS.length)await delay(200);
  }
}

// ── 5. Ticker details → shares outstanding for market cap ──
async function fetchShares(){
  const BATCH=10;
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  for(let i=0;i<TICKERS.length;i+=BATCH){
    const batch=TICKERS.slice(i,i+BATCH);
    await Promise.all(batch.map(tk=>
      fetch(`https://api.polygon.io/v3/reference/tickers/${tk}?apiKey=${POLYGON_KEY}`)
        .then(r=>r.ok?r.json():null)
        .then(data=>{
          if(data?.results){
            const s=data.results.weighted_shares_outstanding||data.results.share_class_shares_outstanding;
            if(s)_shares[tk]=s;
          }
        }).catch(()=>{})
    ));
    if(i+BATCH<TICKERS.length)await delay(200);
  }
}

// ── Master update: apply all data to R array ──
function applyToR(map){
  let updated=0;
  R.forEach(r=>{
    const tk=r[1],d=map[tk];
    // Price + Day Δ from snapshot/grouped
    if(d){
      r[2]=Math.round(d.price*100)/100;
      if(d.pct!=null)r[14]=d.pct;
      updated++;
    }
    // Dividend yield = trailing 12M dividends / price × 100
    if(_annualDiv[tk]&&r[2]>0)r[3]=parseFloat((_annualDiv[tk]/r[2]*100).toFixed(1));
    // 1M / 3M / 1Y returns from historical base prices
    const h1=_histPrices.m1[tk],h3=_histPrices.m3[tk],h12=_histPrices.y1[tk];
    if(h1&&r[2])r[4]=parseFloat(((r[2]-h1)/h1*100).toFixed(1));
    if(h3&&r[2])r[5]=parseFloat(((r[2]-h3)/h3*100).toFixed(1));
    if(h12&&r[2])r[6]=parseFloat(((r[2]-h12)/h12*100).toFixed(1));
    // Market cap = shares × price / 1B
    if(_shares[tk]&&r[2])r[7]=parseFloat((_shares[tk]*r[2]/1e9).toFixed(1));
  });
  return updated;
}

// ── Main fetch (called every 60s) ──
async function fetchPrices(){
  try{
    let map;
    let mode="snapshot";
    try{
      map=await fetchSnapshot();
      // Validate we got real data
      if(Object.keys(map).length<5)throw new Error("Too few results from snapshot");
    }catch(e){
      console.warn("⚠ Snapshot failed:",e.message,"— falling back to grouped daily");
      mode="grouped";
      map=await fetchGrouped();
    }
    const updated=applyToR(map);
    _feedError=null;
    _feedMode=mode;
    return{updated,total:R.length,ts:new Date(),mode};
  }catch(e){console.error("Polygon error:",e);_feedError=e.message;return null;}
}
